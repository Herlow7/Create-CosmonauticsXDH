name: Create Release and Notify Discord

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Build with Gradle
        run: chmod +x ./gradlew && ./gradlew build

      - name: Upload JAR to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish update to CurseForge
        id: publish_curseforge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: "1595491"
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}

      # - name: Publish update to Modrinth
      #   id: publish_modrinth
      #   uses: Kir-Antipov/mc-publish@v3.3
      #   with:
      #     modrinth-id: "micg1iTH"
      #     modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
      #     version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}

      - name: Send Discord Notification
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          CHANGELOG: ${{ github.event.release.body }}
          GITHUB_URL: ${{ github.event.release.html_url }}
          MODRINTH_URL: ${{ steps.publish_modrinth.outputs.modrinth-url }}
          CURSEFORGE_FILE_ID: ${{ steps.publish_curseforge.outputs.curseforge-version }}
        run: |
          CF_URL="https://www.curseforge.com/projects/1595491/files/$CURSEFORGE_FILE_ID"

          jq -n \
            --arg ping "<@&1504169248224706691>" \
            --arg title "$RELEASE_NAME" \
            --arg desc "$CHANGELOG" \
            --arg gh_url "$GITHUB_URL" \
            --arg mr_url "$MODRINTH_URL" \
            --arg cf_url "$CF_URL" \
            '{
              content: $ping,
              embeds: [{
                title: $title,
                description: ($desc + "\n\n**Download Update:**\n[GitHub](" + $gh_url + ") | [Modrinth](" + $mr_url + ") | [CurseForge](" + $cf_url + ")"),
                color: 3447003
              }]
            }' > payload.json

          curl -H "Content-Type: application/json" -d @payload.json $DISCORD_WEBHOOK_URL
